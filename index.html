        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f4f7fc;
            color: #1e293b;
            padding: 24px 20px 60px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #006dd4 0%, #004b9a 100%);
            color: #fff;
            border-radius: 24px;
            padding: 28px 36px;
            margin-bottom: 16px;
            box-shadow: 0 12px 30px rgba(0, 109, 212, 0.25);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header h1 i {
            color: #facc15;
            font-size: 32px;
        }
        .header .badge {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .header .badge i {
            margin-right: 8px;
            color: #facc15;
        }

        /* ===== 品牌横幅 ===== */
        .brand-banner {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 16px;
            padding: 10px 24px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            font-weight: 700;
            font-size: 18px;
            color: #006dd4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 1px;
        }
        .brand-banner i {
            color: #facc15;
            font-size: 22px;
        }
        .brand-banner span {
            background: linear-gradient(135deg, #006dd4, #004b9a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 32px 36px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            margin-bottom: 28px;
            border: 1px solid #e9eef3;
            transition: box-shadow 0.2s;
        }
        .search-card:hover {
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
        }
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .search-row .input-wrap {
            flex: 1 1 360px;
            position: relative;
        }
        .search-row .input-wrap i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
        }
        .search-row input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 17px;
            background: #f8fafc;
            transition: all 0.25s;
            outline: none;
            font-weight: 500;
            color: #006dd4;
        }
        .search-row input:focus {
            border-color: #006dd4;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 109, 212, 0.12);
        }
        .search-row input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        .search-row .btn {
            padding: 16px 40px;
            background: linear-gradient(135deg, #006dd4, #004b9a);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(0, 109, 212, 0.25);
        }
        .search-row .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 109, 212, 0.35);
            background: linear-gradient(135deg, #0078e0, #004b9a);
        }
        .search-row .btn:active {
            transform: scale(0.97);
        }
        .search-row .btn i {
            font-size: 18px;
        }
        .search-row .btn-outline {
            background: #e9eef3;
            color: #1e293b;
            box-shadow: none;
        }
        .search-row .btn-outline:hover {
            background: #d6dfe8;
            transform: none;
            box-shadow: none;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 32px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #edf2f7;
            font-size: 14px;
            color: #475569;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats i {
            color: #006dd4;
            width: 18px;
        }
        .stats .highlight {
            font-weight: 700;
            color: #006dd4;
        }

        .result-section {
            margin-top: 28px;
        }
        .empty-state {
            background: #fff;
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            border: 2px dashed #dce3ec;
            color: #64748b;
        }
        .empty-state i {
            font-size: 56px;
            color: #cbd5e1;
            margin-bottom: 18px;
            display: block;
        }
        .empty-state h3 {
            font-size: 22px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .result-block {
            margin-bottom: 32px;
        }
        .result-block .block-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid #e9eef3;
            flex-wrap: wrap;
        }
        .result-block .block-header .num {
            background: #006dd4;
            color: #fff;
            border-radius: 40px;
            padding: 2px 16px;
            font-size: 15px;
            font-weight: 600;
            line-height: 30px;
        }
        .result-block .block-header h2 {
            font-size: 22px;
            font-weight: 700;
            color: #006dd4;
        }
        .result-block .block-header .tag {
            font-size: 14px;
            background: #eef2f6;
            padding: 4px 16px;
            border-radius: 40px;
            color: #475569;
            margin-left: auto;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 18px;
        }

        .unit-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px 22px;
            border: 1px solid #e9eef3;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .unit-card:hover {
            border-color: #b9ccdd;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            transform: translateY(-2px);
        }
        .unit-card .unit-name {
            font-size: 17px;
            font-weight: 700;
            color: #006dd4;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .unit-card .unit-name .province {
            font-size: 13px;
            font-weight: 500;
            background: #e9eef3;
            padding: 0 12px;
            border-radius: 20px;
            color: #475569;
            line-height: 26px;
        }
        .unit-card .unit-name .batch {
            font-size: 12px;
            font-weight: 600;
            background: #dbeafe;
            color: #006dd4;
            padding: 0 12px;
            border-radius: 20px;
            line-height: 24px;
            margin-left: auto;
        }
        .unit-card .match-type {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 14px;
            border-radius: 40px;
            margin-bottom: 12px;
        }
        .unit-card .match-type.exact {
            background: #dcfce7;
            color: #166534;
        }
        .unit-card .match-type.category {
            background: #fef9c3;
            color: #854d0e;
        }
        .unit-card .detail {
            margin-top: 10px;
        }
        .unit-card .detail .label {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 4px;
        }
        .unit-card .detail .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .unit-card .detail .tags .pill {
            background: #f1f5f9;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 13px;
            color: #1e293b;
            border: 1px solid #e2e8f0;
        }
        .unit-card .detail .tags .pill.highlight {
            background: #dbeafe;
            border-color: #93b4d4;
            color: #006dd4;
            font-weight: 500;
        }

        .major-hint {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px 20px;
            margin-top: 18px;
            border-left: 5px solid #006dd4;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 10px 20px;
        }
        .major-hint strong {
            color: #006dd4;
            font-size: 15px;
            white-space: nowrap;
        }
        .major-hint .pill {
            background: #e9eef3;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #1e293b;
            white-space: nowrap;
        }
        .major-hint .pill i {
            margin-right: 6px;
            color: #006dd4;
        }
        .major-hint .major-list {
            font-size: 14px;
            color: #334155;
            flex: 1;
            word-break: break-word;
            line-height: 1.7;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            border-top: 1px solid #e9eef3;
            padding-top: 20px;
        }
        .footer i {
            color: #facc15;
            margin-right: 6px;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px 12px 40px;
            }
            .header {
                padding: 20px 22px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .header h1 {
                font-size: 22px;
            }
            .header .badge {
                font-size: 13px;
                padding: 6px 16px;
            }
            .search-card {
                padding: 20px 18px;
            }
            .search-row .btn {
                width: 100%;
                justify-content: center;
            }
            .result-grid {
                grid-template-columns: 1fr;
            }
            .unit-card .unit-name {
                flex-wrap: wrap;
            }
            .unit-card .unit-name .batch {
                margin-left: 0;
            }
            .stats {
                font-size: 13px;
                gap: 10px 20px;
            }
            .major-hint {
                flex-direction: column;
                align-items: flex-start;
            }
            .major-hint .pill {
                white-space: normal;
            }
            .brand-banner {
                font-size: 16px;
                padding: 8px 16px;
            }
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 19px;
                flex-wrap: wrap;
            }
            .search-row input {
                font-size: 15px;
                padding: 14px 16px 14px 46px;
            }
            .search-row .btn {
                font-size: 15px;
                padding: 14px 20px;
            }
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9ccdd;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #93b4d4;
        }
    </style>
</head>

            ], '计算机类': ['计算机科学与技术'], '通信类': ['通信工程'], '其他工学类': ['土木工程',
                '水利水电工程'
            ], '财务会计类': ['会计学'], '管理类': ['工程管理', '工程造价'] });
        addUnit('重庆智网科技产业发展有限公司', '重庆', '三批', { '电工类': [], '计算机类': ['计算机科学与技术',
                '网络工程', '信息安全'
            ], '通信类': ['通信工程'], '其他工学类': ['土木工程', '建筑学', '结构工程'],
            '管理类': ['工程造价', '工程管理', '技术经济及管理'] });
        addUnit('陕西秦智电供电服务有限公司', '陕西', '三批', { '电工类': ['电气工程', '电力系统及其自动化',
                '电气工程及其自动化', '高电压与绝缘技术', '电机与电器', '电工理论与新技术', '电力电子与电力传动',
                '继电保护', '能源与电力系统', '供用电技术'
            ], '计算机类': ['计算机科学与技术', '软件工程', '网络工程', '电子科学与技术'], '通信类': ['通信工程',
                '电子信息工程'
            ], '其他工学类': ['土木工程', '能源与动力工程', '安全工程', '自动化', '机械制造及其自动化',
                '机械设计制造及其自动化', '水利水电工程', '环境工程', '测控技术与仪器', '测绘工程', '物流工程',
                '机械工程'
            ], '管理类': ['工程造价', '工程管理', '项目管理', '工商管理', '技术经济', '技术经济及管理'] });
        addUnit('新疆新能集团产业发展有限公司', '新疆', '三批', { '电工类': ['电气工程及其自动化', '智能电网信息工程',
                '电力工程与管理', '水电站机电设备与自动化'
            ], '计算机类': ['网络工程'], '通信类': ['信息与通信工程'], '其他工学类': ['机械工程', '测绘工程',
                '地质工程'
            ], '财务会计类': ['会计学'], '管理类': ['工程造价'] });

        // ================================================================
        // 3. 自动补全专业：将 UNIT_DATA 中出现的所有专业加入 MAJOR_DB
        // ================================================================
        function ensureAllMajorsCovered() {
            // 收集所有出现的专业（去重）
            const allMajorSet = new Set();
            for (const unit of UNIT_DATA) {
                for (const category in unit.majors) {
                    const list = unit.majors[category];
                    if (Array.isArray(list)) {
                        for (const m of list) {
                            if (m && typeof m === 'string' && m.trim() !== '') {
                                allMajorSet.add(m.trim());
                            }
                        }
                    }
                }
            }

            // 现有分类中的所有专业（用于判断是否已存在）
            const existingMajors = new Set();
            for (const list of Object.values(MAJOR_DB)) {
                for (const m of list) {
                    existingMajors.add(m);
                }
            }

            // 需要新增的专业
            const toAdd = [];
            for (const m of allMajorSet) {
                if (!existingMajors.has(m)) {
                    toAdd.push(m);
                }
            }

            // 按关键词归类
            const categoryKeywords = {
                '电工类': ['电气', '电力', '高电压', '继电保护', '供用电', '发电', '输配电', '智能电网', '电机', '电工', '农业电气化',
                    '可再生能源'
                ],
                '通信类': ['通信', '信号', '信息工程', '电子', '微波', '光', '电磁场', '无线电', '集成电路', '微电子', '光电',
                    '水声'
                ],
                '计算机类': ['计算机', '软件', '网络', '信息安全', '人工智能', '大数据', '物联网', '数字媒体', '数据库', '控制',
                    '系统结构'
                ],
                '其他工学类': ['土木', '建筑', '结构', '岩土', '地质', '水利', '市政', '给排水', '道路', '桥梁', '交通', '力学',
                    '热能', '动力', '机械', '车辆', '材料', '化工', '环境', '光学', '焊接', '金属', '自动化', '控制工程',
                    '测控', '仪器', '系统工程', '轨道交通', '导航', '能源与动力', '新能源', '安全工程', '消防', '测绘', '城乡规划',
                    '储能', '材料物理', '仪器科学'
                ],
                '金融类': ['金融', '保险', '信用', '证券', '投资', '货币', '银行'],
                '财务会计类': ['会计', '财务', '税务', '审计', '财会'],
                '管理类': ['管理', '人力', '劳动', '物流', '工商', '工程管理', '造价', '工业工程', '信息管理', '项目', '物资',
                    '采购', '市场营销', '经济', '统计', '贸易', '商务', '资产评估', '公共经济'
                ],
                '其他类': ['法律', '法学', '新闻', '哲学', '思政', '教育', '心理', '外语', '数学', '物理', '化学', '气象', '有机',
                    '电子商务', '信息与计算科学', '马克思主义', '汉语言', '中文', '马哲', '思政', '应急', '物流工程与管理'
                ]
            };

            // 辅助函数：判断专业属于哪个大类
            function getCategoryForMajor(major) {
                const lower = major.toLowerCase();
                for (const [cat, keywords] of Object.entries(categoryKeywords)) {
                    for (const kw of keywords) {
                        if (lower.includes(kw.toLowerCase()) || kw.toLowerCase().includes(lower)) {
                            return cat;
                        }
                    }
                }
                return '其他类'; // 默认
            }

            // 将新专业添加到对应分类
            for (const m of toAdd) {
                const cat = getCategoryForMajor(m);
                if (!MAJOR_DB[cat]) {
                    MAJOR_DB[cat] = [];
                }
                // 避免重复（虽然已经检查过，但以防万一）
                if (!MAJOR_DB[cat].includes(m)) {
                    MAJOR_DB[cat].push(m);
                }
            }
        }

        // 执行补全
        ensureAllMajorsCovered();

        // ================================================================
        // 4. 工具函数 & 统计
        // ================================================================
        const majorToCategory = new Map();
        for (const [cat, majors] of Object.entries(MAJOR_DB)) {
            for (const m of majors) {
                if (!majorToCategory.has(m.toLowerCase())) {
                    majorToCategory.set(m.toLowerCase(), cat);
                }
            }
        }

        function calcStats() {
            const allMajors = new Set();
            for (const list of Object.values(MAJOR_DB)) {
                for (const m of list) allMajors.add(m);
            }
            const provinces = new Set(UNIT_DATA.map(u => u.province));
            document.getElementById('totalMajors').textContent = allMajors.size;
            document.getElementById('totalUnits').textContent = UNIT_DATA.length;
            document.getElementById('totalProvinces').textContent = provinces.size;
        }
        calcStats();

        // ================================================================
        // 5. 搜索核心逻辑 (精准匹配优先)
        // ================================================================
        function searchMajor(input) {
            const term = input.trim();
            if (!term) return { category: null, exactUnits: [], categoryUnits: [] };

            const termLower = term.toLowerCase();
            let category = null;

            // 1) 精确匹配专业名称
            if (majorToCategory.has(termLower)) {
                category = majorToCategory.get(termLower);
            } else {
                // 2) 模糊匹配（包含关系）
                for (const [major, cat] of majorToCategory) {
                    if (major.includes(termLower) || termLower.includes(major)) {
                        category = cat;
                        break;
                    }
                }
                // 3) 匹配大类名称
                if (!category) {
                    for (const cat of Object.keys(MAJOR_DB)) {
                        if (cat.includes(term) || term.includes(cat)) {
                            category = cat;
                            break;
                        }
                    }
                }
            }

            if (!category) {
                return { category: null, exactUnits: [], categoryUnits: [] };
            }

            const allMajorsInCategory = MAJOR_DB[category] || [];
            const exactUnits = [];
            const categoryUnits = [];

            for (const unit of UNIT_DATA) {
                const majors = unit.majors || {};
                if (!majors[category]) continue;

                const list = majors[category];
                let matched = false;
                let isExact = false;

                if (Array.isArray(list) && list.length === 0) {
                    // 空数组表示招聘该大类下所有专业 -> 大类匹配
                    matched = true;
                    isExact = false;
                } else if (Array.isArray(list)) {
                    // 精准匹配：检查是否包含用户输入的精确专业名称
                    if (list.some(m => m.toLowerCase() === termLower)) {
                        matched = true;
                        isExact = true;
                    } else {
                        // 大类匹配：检查是否包含该大类下的任意专业
                        for (const m of allMajorsInCategory) {
                            if (list.some(lm => lm.toLowerCase() === m.toLowerCase())) {
                                matched = true;
                                isExact = false;
                                break;
                            }
                        }
                    }
                }

                if (matched) {
                    const entry = { ...unit, matchedCategory: category, matchType: isExact ? '精准' : '大类' };
                    if (isExact) {
                        exactUnits.push(entry);
                    } else {
                        categoryUnits.push(entry);
                    }
                }
            }

            return { category, exactUnits, categoryUnits };
        }

        // ================================================================
        // 6. 渲染
        // ================================================================
        const resultContainer = document.getElementById('resultContainer');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');

        function renderResults(result) {
            const { category, exactUnits, categoryUnits } = result;
            emptyState.style.display = 'none';

            if (!category) {
                resultContainer.innerHTML = `
                    <div class="empty-state" style="display:block;">
                        <i class="fas fa-exclamation-triangle" style="color:#facc15;"></i>
                        <h3>未找到匹配的专业大类</h3>
                        <p>请检查输入的专业名称是否正确，或尝试使用更通用的关键词。</p>
                    </div>
                `;
                return;
            }

            const allMajorsInCat = MAJOR_DB[category] || [];
            // 完整展示所有专业
            const categoryDisplay = `
                <div class="major-hint">
                    <strong><i class="fas fa-tag"></i> 专业大类：${category}</strong>
                    <span class="pill"><i class="fas fa-list"></i> 包含 ${allMajorsInCat.length} 个具体专业</span>
                    <div class="major-list">${allMajorsInCat.join('、')}</div>
                </div>
            `;

            let html = categoryDisplay;

            // 第一部分：精准匹配
            html += `<div class="result-block">`;
            html += `<div class="block-header">
                        <h2><i class="fas fa-check-circle" style="color:#16a34a;"></i> 精准匹配</h2>
                        <span class="num">${exactUnits.length}</span>
                        <span class="tag">专业名称完全匹配</span>
                     </div>`;
            if (exactUnits.length === 0) {
                html += `<p style="color:#94a3b8;padding:8px 4px;">暂无精准匹配的单位</p>`;
            } else {
                html += `<div class="result-grid">`;
                for (const u of exactUnits) {
                    html += renderUnitCard(u, category, 'exact');
                }
                html += `</div>`;
            }
            html += `</div>`;

            // 第二部分：大类匹配
            html += `<div class="result-block">`;
            html += `<div class="block-header">
                        <h2><i class="fas fa-layer-group" style="color:#854d0e;"></i> 大类匹配</h2>
                        <span class="num">${categoryUnits.length}</span>
                        <span class="tag">按「${category}」大类匹配</span>
                     </div>`;
            if (categoryUnits.length === 0) {
                html += `<p style="color:#94a3b8;padding:8px 4px;">暂无大类匹配的单位</p>`;
            } else {
                html += `<div class="result-grid">`;
                for (const u of categoryUnits) {
                    html += renderUnitCard(u, category, 'category');
                }
                html += `</div>`;
            }
            html += `</div>`;

            if (exactUnits.length === 0 && categoryUnits.length === 0) {
                html = categoryDisplay + `
                    <div class="empty-state" style="display:block;margin-top:16px;">
                        <i class="fas fa-building" style="color:#94a3b8;"></i>
                        <h3>暂无报考单位</h3>
                        <p>2026 年国家电网招聘中暂未找到包含「${category}」类专业的单位，请关注后续公告。</p>
                    </div>
                `;
            }

            resultContainer.innerHTML = html;
        }

        function renderUnitCard(unit, category, type) {
            const majors = unit.majors || {};
            const catMajors = majors[category] || [];
            const displayMajors = Array.isArray(catMajors) ? catMajors : [];
            const allMajorsInCat = MAJOR_DB[category] || [];

            // 完整展示：如果单位指定了具体专业则展示，否则展示该大类下所有专业
            const showMajors = displayMajors.length > 0 ? displayMajors : allMajorsInCat;

            const typeLabel = type === 'exact' ? '精准匹配' : '大类匹配';
            const typeClass = type === 'exact' ? 'exact' : 'category';

            return `
                <div class="unit-card">
                    <div class="unit-name">
                        <span>${unit.name}</span>
                        <span class="province">${unit.province}</span>
                        <span class="batch">${unit.batch}</span>
                    </div>
                    <div class="match-type ${typeClass}">${typeLabel}</div>
                    <div class="detail">
                        <div class="label"><i class="fas fa-graduation-cap"></i> 招聘专业（${category}）</div>
                        <div class="tags">
                            ${showMajors.length > 0 ? showMajors.map(m => `<span class="pill">${m}</span>`).join('') : `<span class="pill" style="background:#f1f5f9;color:#64748b;">该大类下所有专业</span>`}
                        </div>
                    </div>
                </div>
            `;
        }

        function showEmpty() {
            emptyState.style.display = 'block';
            resultContainer.innerHTML = '';
        }

        // ================================================================
        // 7. 事件绑定
        // ================================================================
        function doSearch() {
            const input = searchInput.value.trim();
            if (!input) {
                showEmpty();
                return;
            }
            const result = searchMajor(input);
            renderResults(result);
        }

        searchBtn.addEventListener('click', doSearch);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            showEmpty();
            searchInput.focus();
        });

        // 默认加载示例
        window.addEventListener('DOMContentLoaded', () => {
            searchInput.value = '电气工程';
            doSearch();
        });
    </script>
</body>
</html>
